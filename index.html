<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apple Vibe 🔥</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #fff;
      color: #111;
      text-align: center;
    }
    header {
      padding: 50px 20px;
      border-bottom: 1px solid #ddd;
    }
    h1 {
      font-size: 3em;
      font-weight: 600;
      margin: 0 0 20px;
    }
    p {
      font-size: 1.2em;
      color: #666;
    }
    .btn {
      display: inline-block;
      margin: 30px 10px;
      padding: 15px 30px;
      background-color: #0071e3;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 500;
      transition: background 0.3s;
    }
    .btn:hover {
      background-color: #005bb5;
    }
    footer {
      margin-top: 80px;
      padding: 20px;
      border-top: 1px solid #ddd;
      font-size: 0.9em;
      color: #888;
    }
  </style>
</head>
<body>
  <header>
    <h1>Apple Vibe 🔥</h1>
    <p>Minimalistyczna strona w stylu Apple.</p>
    <a href="#" class="btn">Learn More</a>
    <a href="#" class="btn">Shop Now</a>
  </header>
  <footer>
    &copy; 2026 Patryk. All Rights Reserved.
  </footer>
</body>
</html>
