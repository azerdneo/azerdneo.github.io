<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid Glass 🔥</title>
  <style>
    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 200vh; /* żeby było co scrollować */
      background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-x: hidden;
    }

    .liquid-glass {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      padding: 50px;
      border-radius: 30px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.3);
      text-align: center;
      color: #fff;
      transition: transform 0.2s ease;
    }

    .liquid-glass h1 {
      font-size: 2em;
      margin-bottom: 20px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .liquid-glass p {
      font-size: 1.1em;
      line-height: 1.5;
      text-shadow: 0 1px 5px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>

  <div class="liquid-glass" id="glass">
    <h1>Liquid Glass 🔥</h1>
    <p>Przesuwaj stronę i zobacz efekt rozmytej szyby. Scroll daje fajną interakcję!</p>
  </div>

  <script>
    // Efekt przesuwania
    const glass = document.getElementById('glass');
    window.addEventListener('scroll', () => {
      const y = window.scrollY;
      glass.style.transform = `translate(-50%, calc(-50% + ${y * 0.5}px))`;
    });
  </script>

</body>
</html>
